<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kontakt</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <h1>Rennrad Webshop</h1>
      <h2>Kontakt</h2>
      <nav aria-label="Hauptnavigation">
        <a href="home.html">Startseite</a>
        <a href="products.html">Produkte</a>
        <a href="contact.html">Kontakt</a>
      </nav>
    </header>
    <footer>
      <section class="newsletter" aria-labelledby="newsletter-title">
        <h3 id="newsletter-title">Newsletter Abo</h3>
        <p class="newsletter-text">
          Erhalte Updates zu neuen Modellen, Aktionen und Zubehör.
        </p>
        <form class="newsletter-form" action="#" method="post">
          <label for="newsletter-email">E-Mail-Adresse</label>
          <input
            id="newsletter-email"
            name="email"
            type="email"
            placeholder="name@beispiel.ch"
            autocomplete="email"
            required
          />
          <button type="submit">Anmelden</button>
        </form>
        <p class="newsletter-hint">Kein Spam. Abmeldung jederzeit möglich.</p>
      </section>
    </footer>
  </body>
</html>
